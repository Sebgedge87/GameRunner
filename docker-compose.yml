services:
  chronicle:
    build: .
    restart: unless-stopped
    environment:
      PORT: "3000"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-https://chronicle.local}"
      DB_PATH: /data/chronicle.db
      VAULT_PATH: /data/vault
      GM_USERNAME: "${GM_USERNAME:-dungeonmaster}"
    volumes:
      - chronicle-data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  chronicle-data:
